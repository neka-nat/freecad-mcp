<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stlux - King of the CADstle</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; overflow: hidden; background: #1a1a1a; color: #eee; }
        #sidebar { width: 400px; background: #252525; display: flex; flex-direction: column; border-right: 1px solid #333; z-index: 10; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        #viewer { flex-grow: 1; position: relative; background: radial-gradient(circle, #2c3e50 0%, #000000 100%); }
        .header { padding: 25px; background: #111; border-bottom: 2px solid #007bff; text-align: center; }
        h1 { font-size: 1.5rem; margin: 0; color: #ffcc00; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255, 204, 0, 0.5); }
        #chat-container { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .message { padding: 12px 16px; border-radius: 12px; max-width: 90%; font-size: 0.95rem; line-height: 1.5; position: relative; }
        .user-message { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
        .ai-message { align-self: flex-start; background: #333; color: #ffcc00; border: 1px solid #444; border-bottom-left-radius: 2px; }
        .download-btn { display: inline-block; margin-top: 10px; padding: 8px 15px; background: #28a745; color: white; text-decoration: none; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }
        .download-btn:hover { background: #218838; }
        .input-area { padding: 20px; background: #111; border-top: 1px solid #333; }
        textarea { width: 100%; height: 80px; background: #1a1a1a; border: 1px solid #444; color: #ffcc00; padding: 12px; border-radius: 8px; resize: none; box-sizing: border-box; outline: none; font-size: 1rem; }
        textarea:focus { border-color: #ffcc00; }
        .controls { display: flex; gap: 12px; margin-top: 12px; }
        button { flex-grow: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.2s; text-transform: uppercase; }
        #sendBtn { background: #ffcc00; color: #000; }
        #sendBtn:hover { background: #e6b800; transform: translateY(-2px); }
        #directBtn { background: #444; color: #bbb; width: 100px; flex-grow: 0; font-size: 0.7rem; }
        .loading { display: inline-block; width: 24px; height: 24px; border: 3px solid rgba(255,204,0,.2); border-radius: 50%; border-top-color: #ffcc00; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="header">
            <h1>KING OF THE CADSTLE</h1>
            <div id="connectionStatus" style="font-size: 0.75rem; color: #666; margin-top: 5px;">👑 Summoning FreeCAD...</div>
            <input type="password" id="hfToken" placeholder="HF Access Token" style="width: 100%; margin-top: 10px; background: #222; border: 1px solid #444; color: #fff; font-size: 0.7rem; padding: 5px; border-radius: 4px;">
        </div>
        <div id="chat-container">
            <div class="message ai-message">Greetings! I am the King of the CADstle. Command me to build, repair, and export anything for your 3D printer.</div>
        </div>
        <div class="input-area">
            <textarea id="userInput" placeholder="e.g. Build a 50mm crown and export it for printing"></textarea>
            <div class="controls">
                <button id="directBtn" title="Direct Python Script">Script</button>
                <button id="sendBtn">Command the King</button>
            </div>
        </div>
    </div>
    <div id="viewer">
        <div id="canvas-container" style="width: 100%; height: 100%;"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script src="static/slicer.js"></script>
    <script src="static/app.js"></script>
</body>
</html>
